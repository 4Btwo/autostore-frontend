services:
  - type: web
    name: autostore-backend
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FIREBASE_SERVICE_ACCOUNT_B64
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: APIBRASIL_BEARER_TOKEN
        sync: false
      - key: APIBRASIL_DEVICE_TOKEN
        sync: false
